<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Favorite Animals</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            margin:0;
            background:#f4f4f4;
        }

        header{
            background:#2c3e50;
            color:white;
            text-align:center;
            padding:20px;
        }

        nav{
            background:#34495e;
            padding:10px;
            text-align:center;
        }

        nav a{
            color:white;
            text-decoration:none;
            margin:0 15px;
        }

        main{
            width:80%;
            margin:30px auto;
            background:white;
            padding:20px;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,.2);
        }

        img{
            width:300px;
            height:200px;
            object-fit:cover;
            border-radius:8px;
            margin:10px;
        }

        footer{
            background:#2c3e50;
            color:white;
            text-align:center;
            padding:15px;
            margin-top:30px;
        }

        ul{
            line-height:2;
        }

        .gallery{
            text-align:center;
        }

    </style>

</head>

<body>

<header>
    <h1>My Favorite Animals</h1>
    <p>A simple HTML practice website</p>
</header>

<nav>
    <a href="#animals">Animals</a>
    <a href="#gallery">Gallery</a>
    <a href="#more">More Info</a>
</nav>

<main>

<section id="animals">

<h2>My Favorite Animals</h2>

<ul>
    <li>Dog</li>
    <li>Cat</li>
    <li>Tiger</li>
</ul>

</section>

<section id="gallery">

<h2>Animal Gallery</h2>

<div class="gallery">

<img src="https://images.unsplash.com/photo-1517849845537-4d257902454a?w=500" alt="Dog">

<img src="https://images.unsplash.com/photo-1519052537078-e6302a4968d4?w=500" alt="Cat">

<img src="https://images.unsplash.com/photo-1549366021-9f761d450615?w=500" alt="Tiger">

</div>

</section>

<section id="more">

<h2>Learn More</h2>

<p>
Visit
<a href="https://en.wikipedia.org/wiki/Animal" target="_blank">
Wikipedia
</a>
to learn more about animals.
</p>

</section>

</main>

<footer>

<p>Created by Hoang Vu Huy © 2026</p>

</footer>

</body>
</html>
